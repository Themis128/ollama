name: Agentic Code Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  storm-review:
    name: Agent Storm Code Review
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt langchain-ollama

    - name: Fetch Changed Files
      id: changed-files
      run: |
        echo "changed=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | tr '\n' ' ')" >> $GITHUB_OUTPUT
        echo "::notice::Changed files: ${{ steps.changed-files.outputs.changed }}"

    - name: Orchestrator - Architecture Review
      run: |
        echo "::notice::Orchestrator analyzing architectural impact"
        echo "Would run: orchestrator.execute(mode='architect', task='Review ${{ steps.changed-files.outputs.changed }}')"

    - name: Agent Storm - Security & Testing
      run: |
        echo "::notice::Agent Storm reviewing security and testing aspects"
        echo "Would run: storm.storm_with_roles("
        echo "  task='Security and testing review of PR #${{ github.event.pull_request.number }}',"
        echo "  roles=['security', 'testing']"
        echo ")"

    - name: Debug Agent - Error Pattern Analysis
      run: |
        echo "::notice::Debug Agent analyzing for error patterns"
        echo "Would run: debugger.analyze_logs('Looking for anti-patterns in changed files')"

    - name: Post Review Summary
      run: |
        echo "::notice::Agentic code review complete!"
        echo "Review PR #${{ github.event.pull_request.number }} with orchestrator + storm perspectives"
