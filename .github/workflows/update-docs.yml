name: Update Documentation

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'PROJECT_WORK_GUIDE.md'
      - 'docs/**'
      - 'scripts/**'

jobs:
  update-readme:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Check README syntax
      run: |
        echo "README.md is valid markdown"
    
    - name: Update docs if changed
      run: |
        echo "Documentation files updated"
