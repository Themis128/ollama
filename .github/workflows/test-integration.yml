name: Test Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: test-ollama-infra
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Run All Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Test ClineAdapter
      run: python scripts/test-all-tools.py
    
    - name: Test NLP Processor
      run: python scripts/test-nlp-processor.py
    
    - name: Check syntax
      run: python -m py_compile integrations/*.py scripts/*.py