name: Agentic Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: read

jobs:
  pre-release-analysis:
    name: Pre-Release Analysis
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt langchain-ollama

    - name: Run Agent Storm Release Planning
      run: |
        echo "::notice::Agent Storm analyzing release readiness"
        echo "Would execute: storm.storm_with_roles("
        echo "  task='Analyze release quality',"
        echo "  roles=['architect', 'testing', 'security']"
        echo ")"

    - name: Orchestrator Release Validation
      run: |
        echo "::notice::Orchestrator validating release in auto mode"
        echo "Would execute: orchestrator.execute(mode='auto', task='Validate release build')"

  build-and-test:
    name: Build & Test Release
    runs-on: ubuntu-latest
    needs: pre-release-analysis

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: TDD Agent - Generate Release Tests
      run: |
        echo "::notice::TDD Agent generating release validation tests"
        echo "Would run: tdd.run_tdd(feature='Release validation', ...)"

    - name: Build package
      run: python -m build

  release-publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Post-Release Analysis
      run: |
        echo "::notice::Release published successfully!"
        echo "::notice::Agent Storm could analyze release notes for improvements"
