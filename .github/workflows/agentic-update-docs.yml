name: Agentic Documentation

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'PROJECT_WORK_GUIDE.md'
      - 'docs/**'
      - 'integrations/**'
      - 'scripts/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  documentation-analysis:
    name: AI Documentation Analysis
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install langchain-ollama langchain-core

    - name: Orchestrator - Documentation Review
      run: |
        echo "::notice::Orchestrator validating documentation changes"
        echo "Would run: orchestrator.execute(mode='auto', task='Review documentation quality')"

    - name: Agent Storm - Multi-Perspective Documentation Check
      run: |
        echo "::notice::Agent Storm verifying documentation completeness"
        echo "Would run: storm.storm_with_roles("
        echo "  task='Verify documentation completeness and accuracy',"
        echo "  roles=['architect', 'testing']"
        echo ")"

    - name: Debug Agent - Check Documentation Issues
      run: |
        echo "::notice::Debug Agent scanning for documentation gaps"
        echo "Would analyze for missing docs, outdated examples, unclear instructions"

    - name: Validate Documentation Structure
      run: |
        echo "::notice::Documentation validation complete"
        echo "Files changed in: README.md, PROJECT_WORK_GUIDE.md, docs/**"
